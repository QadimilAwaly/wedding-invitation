<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Undangan Pernikahan Arif dan Janah</title>
    <meta id="meta-description" name="description" content="Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir di acara pernikahan kami.">
    <meta id="meta-keywords" name="keywords" content="undangan pernikahan, wedding invitation, romeo juliet">
    <meta id="meta-author" name="author" content="Arif dan Janah">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta id="og-url" property="og:url" content="https://qadimilawaly.github.io/wedding-invitation/">
    <meta id="og-title" property="og:title" content="Undangan Pernikahan Arif dan Janah">
    <meta id="og-description" property="og:description" content="Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir di acara pernikahan kami.">
    <meta id="og-image" property="og:image" content="https://drive.google.com/uc?export=view&id=1EdNsLUX6-IIC_w98IUpE1_def6PeiF7x">
    <meta property="og:image:alt" content="Undangan Pernikahan Arif dan Janah">
    <meta property="og:site_name" content="Undangan Pernikahan Arif dan Janah">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta id="twitter-url" property="twitter:url" content="https://qadimilawaly.github.io/wedding-invitation/">
    <meta id="twitter-title" property="twitter:title" content="Undangan Pernikahan Arif dan Janah">
    <meta id="twitter-description" property="twitter:description" content="Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir di acara pernikahan kami.">
    <meta id="twitter-image" property="twitter:image" content="https://drive.google.com/uc?export=view&id=1EdNsLUX6-IIC_w98IUpE1_def6PeiF7x">
    
    <link id="favicon" rel="icon" type="image/png" href="https://via.placeholder.com/32x32.png?text=R%26J">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style-modern.css">
</head>
<body>
    <!-- Audio Player -->
    <audio id="wedding-music" style="display: none;" preload="auto" playsinline></audio>

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-heart"></div>
            <p id="loading-text"></p>
            <p class="loading-instruction" id="loading-instruction"></p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="floating-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-heart"></i>
                <span id="nav-couple-names"></span>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link" id="nav-home"></a></li>
                <li><a href="#couple" class="nav-link" id="nav-couple"></a></li>
                <li><a href="#events" class="nav-link" id="nav-events"></a></li>
                <li><a href="#gallery" class="nav-link" id="nav-gallery"></a></li>
            </ul>
            <button class="nav-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero-section">
        <div class="hero-background">
            <div class="hero-overlay"></div>
            <div class="hero-particles"></div>
        </div>
        <div class="hero-content">
            <div class="hero-decorative-element">
                <i class="fas fa-ornament"></i>
            </div>
            <h1 class="hero-title" id="hero-title"></h1>
            <p class="hero-subtitle" id="hero-subtitle"></p>
            <div class="hero-couple">
                <div class="hero-bride">
                    <h2 id="hero-bride-name"></h2>
                </div>
                <div class="hero-ampersand" id="hero-ampersand"></div>
                <div class="hero-groom">
                    <h2 id="hero-groom-name"></h2>
                </div>
            </div>
            <div class="hero-scroll">
                <i class="fas fa-chevron-down"></i>
                <p id="scroll-text"></p>
            </div>
        </div>
    </section>

    <!-- Couple Section -->
    <section id="couple" class="couple-section">
        <div class="section-header">
            <div class="section-decoration">
                <i class="fas fa-heart"></i>
            </div>
            <h2 class="section-title" id="couple-section-title"></h2>
            <p class="section-subtitle" id="couple-subtitle"></p>
        </div>
        
        <div class="couple-container">
            <div class="couple-card bride-card">
                <div class="couple-image-wrapper">
                    <div class="image-frame">
                        <img id="bride-photo" src="https://via.placeholder.com/400x500/ff69b4/ffffff?text=Sarah" alt="Bride" class="couple-image">
                        <div class="image-decoration"></div>
                    </div>
                </div>
                <div class="couple-info">
                    <h3 id="bride-name"></h3>
                    <p class="couple-title" id="bride-title"></p>
                    <div class="parents-info">
                        <p id="bride-father"></p>
                        <p id="bride-and"></p>
                        <p id="bride-mother"></p>
                    </div>
                </div>
            </div>
            
            <div class="couple-divider">
                <div class="divider-ring">
                    <i class="fas fa-heart"></i>
                </div>
            </div>
            
            <div class="couple-card groom-card">
                <div class="couple-image-wrapper">
                    <div class="image-frame">
                        <img id="groom-photo" src="https://via.placeholder.com/400x500/4169e1/ffffff?text=Michael" alt="Groom" class="couple-image">
                        <div class="image-decoration"></div>
                    </div>
                </div>
                <div class="couple-info">
                    <h3 id="groom-name"></h3>
                    <p class="couple-title" id="groom-title"></p>
                    <div class="parents-info">
                        <p id="groom-father"></p>
                        <p id="groom-and"></p>
                        <p id="groom-mother"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Quote Section -->
    <section class="quote-section">
        <div class="quote-background">
            <div class="quote-pattern"></div>
        </div>
        <div class="quote-content">
            <div class="quote-icon">
                <i class="fas fa-quote-left"></i>
            </div>
            <blockquote id="wedding-quote"></blockquote>
            <cite id="quote-source"></cite>
        </div>
    </section>

    <!-- Events Section -->
    <section id="events" class="events-section">
        <div class="section-header">
            <div class="section-decoration">
                <i class="fas fa-calendar"></i>
            </div>
            <h2 class="section-title" id="events-section-title"></h2>
            <p class="section-subtitle" id="events-subtitle"></p>
        </div>
        
        <div class="events-timeline">
            <div class="event-card akad-card">
                <div class="event-time-marker">
                    <div class="event-dot"></div>
                    <div class="event-line"></div>
                </div>
                <div class="event-content">
                    <div class="event-icon">
                        <i class="fas fa-mosque"></i>
                    </div>
                    <h3 id="akad-title"></h3>
                    <div class="event-details">
                        <div class="event-detail-item">
                            <i class="fas fa-calendar-alt"></i>
                            <span id="akad-date"></span>
                        </div>
                        <div class="event-detail-item">
                            <i class="fas fa-clock"></i>
                            <span id="akad-time"></span>
                        </div>
                        <div class="event-detail-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span id="akad-location"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="event-card resepsi-card">
                <div class="event-time-marker">
                    <div class="event-dot"></div>
                </div>
                <div class="event-content">
                    <div class="event-icon">
                        <i class="fas fa-glass-cheers"></i>
                    </div>
                    <h3 id="resepsi-title"></h3>
                    <div class="event-details">
                        <div class="event-detail-item">
                            <i class="fas fa-calendar-alt"></i>
                            <span id="resepsi-date"></span>
                        </div>
                        <div class="event-detail-item">
                            <i class="fas fa-clock"></i>
                            <span id="resepsi-time"></span>
                        </div>
                        <div class="event-detail-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span id="resepsi-location"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Countdown Section -->
    <section class="countdown-section">
        <div class="countdown-background">
            <div class="countdown-pattern"></div>
        </div>
        <div class="countdown-content">
            <h2 class="countdown-title" id="countdown-title"></h2>
            <div class="countdown-timer">
                <div class="countdown-item days-item">
                    <div class="countdown-number-wrapper">
                        <span id="countdown-days" class="countdown-number">00</span>
                    </div>
                    <p class="countdown-label" id="label-days"></p>
                </div>
                <div class="countdown-separator">
                    <span>:</span>
                </div>
                <div class="countdown-item hours-item">
                    <div class="countdown-number-wrapper">
                        <span id="countdown-hours" class="countdown-number">00</span>
                    </div>
                    <p class="countdown-label" id="label-hours"></p>
                </div>
                <div class="countdown-separator">
                    <span>:</span>
                </div>
                <div class="countdown-item minutes-item">
                    <div class="countdown-number-wrapper">
                        <span id="countdown-minutes" class="countdown-number">00</span>
                    </div>
                    <p class="countdown-label" id="label-minutes"></p>
                </div>
                <div class="countdown-separator">
                    <span>:</span>
                </div>
                <div class="countdown-item seconds-item">
                    <div class="countdown-number-wrapper">
                        <span id="countdown-seconds" class="countdown-number">00</span>
                    </div>
                    <p class="countdown-label" id="label-seconds"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="gallery-section">
        <div class="section-header">
            <div class="section-decoration">
                <i class="fas fa-camera"></i>
            </div>
            <h2 class="section-title" id="gallery-section-title"></h2>
            <p class="section-subtitle" id="gallery-subtitle"></p>
        </div>
        
        <div class="gallery-grid">
            <div class="gallery-item gallery-item-1">
                <img src="https://via.placeholder.com/600x400/d4a574/ffffff?text=Photo+1" alt="Gallery 1" class="gallery-image">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            </div>
            <div class="gallery-item gallery-item-2">
                <img src="https://via.placeholder.com/600x400/2c3e50/ffffff?text=Photo+2" alt="Gallery 2" class="gallery-image">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            </div>
            <div class="gallery-item gallery-item-3">
                <img src="https://via.placeholder.com/600x400/e74c3c/ffffff?text=Photo+3" alt="Gallery 3" class="gallery-image">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            </div>
            <div class="gallery-item gallery-item-4">
                <img src="https://via.placeholder.com/600x400/34495e/ffffff?text=Photo+4" alt="Gallery 4" class="gallery-image">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            </div>
            <div class="gallery-item gallery-item-5">
                <img src="https://via.placeholder.com/600x400/9b59b6/ffffff?text=Photo+5" alt="Gallery 5" class="gallery-image">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            </div>
            <div class="gallery-item gallery-item-6">
                <img src="https://via.placeholder.com/600x400/1abc9c/ffffff?text=Photo+6" alt="Gallery 6" class="gallery-image">
                <div class="gallery-overlay">
                    <i class="fas fa-search-plus"></i>
                </div>
            </div>
        </div>
    </section>

    <!-- Location Section -->
    <section class="location-section">
        <div class="section-header">
            <div class="section-decoration">
                <i class="fas fa-map-marked-alt"></i>
            </div>
            <h2 class="section-title" id="location-section-title"></h2>
            <p class="section-subtitle" id="location-subtitle"></p>
        </div>
        
        <div class="location-container">
            <div class="location-map" id="venue-map" style="background: url('https://maps.googleapis.com/maps/api/staticmap?center=Jakarta&zoom=15&size=600x450&style=feature:all|element:labels|visibility:off&style=feature:water|color:0xb3d9ff&style=feature:land|color:0xf3f3f3&style=feature:road|visibility:off&style=feature:administrative|element:geometry.stroke|color:0xcccccc&key=AIzaSyDummyKey') center/cover; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative;">
                <div style="background:rgba(0,0,0,0.5); color:white; padding:20px; border-radius:8px; text-align:center; z-index:10;">
                    <i class="fas fa-map-marker-alt" style="font-size:2em; margin-bottom:10px; display:block;"></i>
                    <p style="margin:0; font-size:1.1em;" id="map-click-text"></p>
                </div>
            </div>
            <div class="location-info">
                <div class="venue-details">
                    <h3 id="venue-name"></h3>
                    <p id="venue-address" class="venue-address"></p>
                </div>
                <div class="location-actions">
                    <button id="directions-btn" class="btn btn-primary">
                        <i class="fas fa-directions"></i>
                        <span id="directions-text"></span>
                    </button>
                    <button id="save-location-btn" class="btn btn-secondary">
                        <i class="fas fa-bookmark"></i>
                        <span id="save-location-text"></span>
                    </button>
                </div>
            </div>
        </div>
    </section>


    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-message">
                <p id="footer-message"></p>
            </div>
            <div class="footer-couple">
                <h3 id="footer-couple-names"></h3>
                <p class="footer-date" id="footer-date"></p>
            </div>
            <div class="footer-social">
                <div class="social-info">
                    <p id="social-text"></p>
                    <p id="social-hashtag"></p>
                </div>
                <div class="social-buttons">
                    <a href="#" class="social-btn" id="social-instagram-link">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="#" class="social-btn" id="social-facebook-link">
                        <i class="fab fa-facebook"></i>
                    </a>
                    <a href="#" class="social-btn" id="social-twitter-link">
                        <i class="fab fa-twitter"></i>
                    </a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p id="footer-copyright"></p>
        </div>
    </footer>

    <!-- Floating Action Buttons -->
    <div class="fab-container">
        <button id="music-toggle" class="fab-btn music-btn">
            <i class="fas fa-music"></i>
        </button>
        <button id="share-btn" class="fab-btn share-btn">
            <i class="fas fa-share-alt"></i>
        </button>
        <button id="print-btn" class="fab-btn print-btn">
            <i class="fas fa-print"></i>
        </button>
        <button id="scroll-to-top" class="fab-btn scroll-btn">
            <i class="fas fa-arrow-up"></i>
        </button>
    </div>

    <!-- Lightbox for Gallery -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close">
                <i class="fas fa-times"></i>
            </button>
            <img id="lightbox-image" src="" alt="Gallery Image">
            <div class="lightbox-nav">
                <button class="lightbox-prev">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="lightbox-next">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="script-modern.js"></script>
</body>
</html>
